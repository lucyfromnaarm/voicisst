name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install ruff
        run: python -m pip install ruff
      - name: Ruff
        run: ruff check src tests

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install PortAudio (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libportaudio2
      # Tests mock faster-whisper and all hardware, so the heavy [local]
      # extra is deliberately NOT installed here. evdev carries a
      # sys_platform == 'linux' marker in pyproject.toml, so the install
      # below works unchanged on Windows and macOS.
      - name: Install package
        run: pip install -e '.[server,dev]'
      - name: Run tests
        run: python -m pytest
